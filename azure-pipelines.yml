# Docker build, ACR push, and Azure Container Apps deployment pipeline
# Builds Vite app, containerizes with Nginx, pushes to ACR, provisions Azure resources, and deploys to ACA

trigger:
  - main

pool:
  name: 'AISWinLocal'

variables:
  # Azure Service Connection name (configure in Project Settings > Service Connections)
  AzureServiceConnectionName: 'Azure Subscription'
  
  # ACR Configuration
  AcrResourceGroup: 'rg-mapbox-prod'
  AcrName: 'acrmapboxprod'
  AcrLoginServer: 'acrmapboxprod.azurecr.io'
  ImageRepository: 'mapbox-app'
  
  # Container Apps Configuration
  AcaResourceGroup: 'rg-mapbox-prod'
  AcaEnvironmentName: 'aca-env-mapbox'
  AcaAppName: 'aca-mapbox-app'
  
  # Image tags
  ImageTag: '$(Build.BuildId)'
  ImageTagLatest: 'latest'

stages:
  - stage: ProvisionAzure
    displayName: 'Provision Azure Resources'
    jobs:
      - job: ProvisionResources
        displayName: 'Create/Verify Azure Resources'
        steps:
          - task: AzureCLI@2
            displayName: 'Create Resource Group'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create `
                  --name $(AcaResourceGroup) `
                  --location eastus `
                  --tags environment=prod app=mapbox

          - task: AzureCLI@2
            displayName: 'Create ACR (if not exists)'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr create `
                  --resource-group $(AcrResourceGroup) `
                  --name $(AcrName) `
                  --sku Basic `
                  --admin-enabled true `
                  --tags environment=prod app=mapbox `
                  2>$null
                if ($LASTEXITCODE -ne 0) { Write-Host "ACR already exists or creation in progress" }

          - task: AzureCLI@2
            displayName: 'Create Container Apps Environment (if not exists)'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Check if environment already exists
                $ENV_EXISTS = az containerapp env show `
                  --resource-group $(AcaResourceGroup) `
                  --name $(AcaEnvironmentName) `
                  --query name -o tsv 2>$null
                
                if ([string]::IsNullOrEmpty($ENV_EXISTS)) {
                  Write-Host "Creating Container Apps environment..."
                  az containerapp env create `
                    --name $(AcaEnvironmentName) `
                    --resource-group $(AcaResourceGroup) `
                    --location eastus `
                    --tags environment=prod app=mapbox
                } else {
                  Write-Host "Container Apps environment already exists"
                }

  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: ProvisionAzure
    condition: succeeded()
    jobs:
      - job: BuildAndPush
        displayName: 'Build Docker Image and Push to ACR'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: |
              npm install
              npm run build
            displayName: 'npm install and build'

          - task: AzureCLI@2
            displayName: 'Login to ACR'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(AcrName)

          - script: |
              docker build -t $(AcrLoginServer)/$(ImageRepository):$(ImageTag) \
                           -t $(AcrLoginServer)/$(ImageRepository):$(ImageTagLatest) \
                           -f $(Build.SourcesDirectory)/Dockerfile \
                           $(Build.SourcesDirectory)
            displayName: 'Build Docker Image'

          - script: |
              docker push $(AcrLoginServer)/$(ImageRepository):$(ImageTag)
              docker push $(AcrLoginServer)/$(ImageRepository):$(ImageTagLatest)
            displayName: 'Push Image to ACR'

  - stage: Deploy
    displayName: 'Deploy to Container Apps'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployApp
        displayName: 'Deploy to Azure Container Apps'
        steps:
          - task: AzureCLI@2
            displayName: 'Create/Update Container App'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Check if app already exists
                $APP_EXISTS = az containerapp show `
                  --resource-group $(AcaResourceGroup) `
                  --name $(AcaAppName) `
                  --query name -o tsv 2>$null
                
                if ([string]::IsNullOrEmpty($APP_EXISTS)) {
                  Write-Host "Creating new Container App..."
                  az containerapp create `
                    --name $(AcaAppName) `
                    --resource-group $(AcaResourceGroup) `
                    --environment $(AcaEnvironmentName) `
                    --image $(AcrLoginServer)/$(ImageRepository):$(ImageTag) `
                    --target-port 80 `
                    --ingress external `
                    --min-replicas 1 `
                    --max-replicas 3 `
                    --cpu 0.5 `
                    --memory 1.0Gi `
                    --registry-server $(AcrLoginServer) `
                    --registry-identity system `
                    --tags environment=prod app=mapbox
                } else {
                  Write-Host "Updating existing Container App..."
                  az containerapp update `
                    --name $(AcaAppName) `
                    --resource-group $(AcaResourceGroup) `
                    --image $(AcrLoginServer)/$(ImageRepository):$(ImageTag) `
                    --tags environment=prod app=mapbox
                }

          - task: AzureCLI@2
            displayName: 'Verify Container App Revision Health'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Wait for revision to be ready (max 60 seconds)
                Write-Host "Waiting for Container App revision to be ready..."
                for ($i = 1; $i -le 12; $i++) {
                  $REVISION_STATE = az containerapp revision list `
                    --resource-group $(AcaResourceGroup) `
                    --name $(AcaAppName) `
                    --query "[0].properties.provisioningState" -o tsv
                  
                  if ($REVISION_STATE -eq "Provisioned") {
                    Write-Host "Revision is ready!"
                    break
                  }
                  
                  Write-Host "Revision state: $REVISION_STATE (attempt $i/12)"
                  Start-Sleep -Seconds 5
                }

          - task: AzureCLI@2
            displayName: 'Get Container App FQDN and Test Health'
            inputs:
              azureSubscription: '$(AzureServiceConnectionName)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Get app FQDN
                $FQDN = az containerapp show `
                  --resource-group $(AcaResourceGroup) `
                  --name $(AcaAppName) `
                  --query properties.configuration.ingress.fqdn -o tsv
                
                Write-Host "##vso[task.setvariable variable=ACA_FQDN]$FQDN"
                Write-Host "Container App URL: https://$FQDN"
                
                # Test health endpoint
                Write-Host "Testing health endpoint..."
                try {
                  $response = Invoke-WebRequest -Uri "https://$FQDN/health" -Method Get -UseBasicParsing -ErrorAction Stop
                  $HTTP_CODE = $response.StatusCode
                } catch {
                  $HTTP_CODE = 000
                }
                
                if ($HTTP_CODE -eq 200) {
                  Write-Host "✓ Health check passed"
                } else {
                  Write-Host "✗ Health check failed with HTTP $HTTP_CODE"
                  exit 1
                }
                
                # Test main app
                Write-Host "Testing main app endpoint..."
                try {
                  $response = Invoke-WebRequest -Uri "https://$FQDN/" -Method Get -UseBasicParsing -ErrorAction Stop
                  $HTTP_CODE = $response.StatusCode
                } catch {
                  $HTTP_CODE = 000
                }
                
                if ($HTTP_CODE -eq 200) {
                  Write-Host "✓ Main app endpoint responding with 200"
                } else {
                  Write-Host "✗ Main app endpoint returned HTTP $HTTP_CODE"
                  exit 1
                }

          - script: |
              echo "Deployment successful!"
              echo "Access your app at: https://$(ACA_FQDN)"
            displayName: 'Deployment Summary'
